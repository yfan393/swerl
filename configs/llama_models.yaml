# Llama 3.1 Model Configurations for SWE-RL
# Works with vLLM's OpenAI-compatible API

# Server configuration (uses port_vllm environment variable)
server:
  host: "127.0.0.1"  # vLLM runs on localhost
  port: null         # Read from port_vllm env var (fallback: 8000)
  api_key: "EMPTY"   # vLLM uses EMPTY as default API key
  timeout: 120

models:
  llama_1b:
    model_id: "meta-llama/Llama-3.1-1B-Instruct"
    context_length: 131072
    max_output_tokens: 8192
    params_billions: 1.0
    inference:
      temperature: 0.7
      top_p: 1.0
    hardware:
      min_gpu_memory_gb: 2
      recommended_batch_size: 8
    description: "1B parameter model - fastest inference, lowest memory"
    use_case: "Fast prototyping, edge deployment, real-time scenarios"

  llama_3b:
    model_id: "meta-llama/Llama-3.1-3B-Instruct"
    context_length: 131072
    max_output_tokens: 8192
    params_billions: 3.0
    inference:
      temperature: 0.7
      top_p: 1.0
    hardware:
      min_gpu_memory_gb: 8
      recommended_batch_size: 4
    description: "3B parameter model - balanced speed and quality"
    use_case: "Production deployments with moderate resources (RECOMMENDED)"

# Comparison study settings
comparison:
  models_to_compare: ["llama_1b", "llama_3b"]
  test_instances: 100
  metrics:
    - "pass_rate"
    - "format_correctness"
    - "execution_time_ms"
    - "tokens_per_second"
  timeout_per_instance: 300

# RAG settings
rag:
  embed_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k: 8
  max_context_tokens: 12000
  index_path: "data/rag/faiss.index"
  chunk_meta_path: "data/rag/chunks.jsonl"
