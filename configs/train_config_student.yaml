# ============================================================
# Student zero-cost training config
# ============================================================
# Designed for smoke tests and small experiments on a free GPU. This will not
# reproduce the paper, but it lets you run the whole training path without
# paying for model APIs, managed vector databases, or experiment trackers.

model:
  name_or_path: "Qwen/Qwen2.5-Coder-0.5B-Instruct"
  max_length: 2048
  use_lora: true
  load_in_4bit: false
  torch_dtype: "float16"

  lora:
    r: 8
    lora_alpha: 16
    target_modules:
      - "q_proj"
      - "v_proj"
      - "k_proj"
      - "o_proj"
    lora_dropout: 0.05
    bias: "none"

grpo:
  num_generations: 2              # GRPO requires >= 2 to compute advantages (compare 2 completions)
  num_problems_per_step: 1
  beta: 0.001
  clip_epsilon: 0.2
  max_steps: 50
  # TRL constraint: generation_batch_size = per_device_train_batch_size *
  # gradient_accumulation_steps * num_processes  must be divisible by num_generations.
  # With num_generations=2, per_device_train_batch_size must be a multiple of 2.
  # per_device_train_batch_size is the TOTAL (prompt × generation) samples per device,
  # so 2 here = 1 unique prompt × 2 generations.
  per_device_train_batch_size: 2      # 1 prompt × 2 generations = 2 total per step
  learning_rate: 1.0e-6
  lr_scheduler: "cosine"
  warmup_steps: 5
  gradient_accumulation_steps: 1      # Memory optimization: reduced from 4
  max_grad_norm: 1.0
  optimizer: "adamw_torch"
  weight_decay: 0.0
  generation_temperature: 1.0
  # Sampling-stability params (prevent NaN/Inf in probability tensor during
  # multinomial sampling on small fp16/fp32 LoRA models). top_p restricts
  # softmax to the most-probable nucleus, top_k caps tail noise, and min_p
  # filters out tokens with vanishing probability.
  top_p: 0.95
  top_k: 50
  min_p: 0.0
  repetition_penalty: 1.0
  max_new_tokens: 256                 # Enough room to close <solution> and SEARCH/REPLACE blocks
  # Truncate prompts so a single long code-context blob can't blow up the
  # backward-pass batch memory. With max_prompt_length=1024 + max_new_tokens=256
  # each sequence is at most 1280 tokens; 2 sequences per step ≈ 2.5k tokens.
  max_prompt_length: 1024
  # Activation checkpointing: ~5-10x reduction in backward-pass memory.
  # Required for the run to fit in 22GB GPUs (otherwise OOMs around step 8
  # when rollouts hit max_new_tokens).
  gradient_checkpointing: true
  save_steps: 25
  logging_steps: 5

reward:
  alpha: 0.3                          # Correctness weight: 0.3 (70% similarity, 30% correctness)
  format_penalty: -1.0                # Penalty for format errors
  use_matcher_correctness: true       # Use SequenceMatcher for continuous correctness (recommended)
                                      # If false: uses binary syntax/lint checks
  continuous_correctness: true        # Legacy: use continuous scoring (ignored if use_matcher_correctness=true)

rag:
  top_k: 3
  index_path: "data/rag/faiss.index"
  chunk_meta_path: "data/rag/chunks.jsonl"
  embed_model: "sentence-transformers/all-MiniLM-L6-v2"
  max_context_tokens: 1500

paths:
  train_file: "data/processed/train.jsonl"
  val_file: "data/processed/val.jsonl"
  output_dir: "outputs/grpo_student"

logging:
  wandb_project: "swe-rl-student"
  wandb_run_name: "grpo-qwen-0.5b-student"
  report_to: "none"

sft_baseline:
  output_dir: "outputs/sft_student"
  train_file: "data/processed/sft_cot_data.jsonl"
  teacher:
    mode: "oracle"
    max_records: 50
  max_steps: 50
  learning_rate: 2.0e-5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_length: 2048
  lr_scheduler: "cosine"
  warmup_steps: 5

evaluation:
  swe_bench_split: "princeton-nlp/SWE-bench_Verified"
  num_repair_samples: 2
  eval_temperature: 1.0
  output_dir: "outputs/eval_student"
